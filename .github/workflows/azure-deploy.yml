name: Deploy Aziad API to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настраиваем .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Восстанавливаем зависимости
      - name: Restore dependencies
        run: dotnet restore

      # 4. Собираем проект
      - name: Build project
        run: dotnet build --no-restore --configuration Release

      # 5. Публикуем проект в папку ./publish
      - name: Publish project
        run: dotnet publish --configuration Release --output ./publish

      # 6. Деплой в Azure WebApp
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: aziadapi                # имя твоего WebApp
          slot-name: Production             # слот деплоя
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
